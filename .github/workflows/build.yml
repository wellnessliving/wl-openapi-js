name: Build SDK

on:
  repository_dispatch:
    types: [openapi-updated]
  schedule:
    # Fallback: runs daily at 08:00 UTC in case the dispatch was missed.
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: build-sdk
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wellnessliving'

      - name: Install dependencies
        run: npm ci

      - name: Generate browser SDK (stable + dev)
        run: node scripts/generate.js

      - name: Generate TypeScript SDK (stable + dev)
        run: node scripts/generate-ts.js

      - name: Compile TypeScript to ESM + CJS + d.ts
        run: node scripts/compile.js

      - name: Check for changes
        id: changes
        run: |
          git add stable/ dev/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes - SDK is up to date."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            STABLE_VER=$(grep -m1 'Spec version:' stable/wl-sdk.js | awk '{print $NF}')
            echo "stable_ver=${STABLE_VER}" >> $GITHUB_OUTPUT
            echo "dev_ver=$(grep -m1 'Spec version:' dev/wl-sdk.js | awk '{print $NF}')" >> $GITHUB_OUTPUT
            echo "method_count=$(grep -m1 'Endpoints:' stable/wl-sdk.js | awk '{print $NF}')" >> $GITHUB_OUTPUT
            echo "Changes detected - will commit and release."
          fi

      - name: Update package.json version
        if: steps.changes.outputs.changed == 'true'
        run: |
          STABLE_VER="${{ steps.changes.outputs.stable_ver }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$STABLE_VER"
          git add package.json

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          STABLE_VER="${{ steps.changes.outputs.stable_ver }}"
          DEV_VER="${{ steps.changes.outputs.dev_ver }}"
          MSG=$(printf 'chore: regenerate SDK from OpenAPI spec\n\nstable: %s\ndev: %s' "$STABLE_VER" "$DEV_VER")
          git commit -m "$MSG"
          git pull --rebase origin main
          git push

      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.changes.outputs.stable_ver }}"
          STABLE_VER="${{ steps.changes.outputs.stable_ver }}"
          DEV_VER="${{ steps.changes.outputs.dev_ver }}"
          METHOD_COUNT="${{ steps.changes.outputs.method_count }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists - skipping."
            exit 0
          fi

          printf '## WellnessLiving JavaScript SDK %s\n\n| | |\n|---|---|\n| Stable spec | `%s` |\n| Dev spec | `%s` |\n| Endpoints | %s |\n\n## CDN links (jsDelivr)\n\n```html\n<!-- Stable (browser UMD) -->\n<script src="https://cdn.jsdelivr.net/gh/wellnessliving/wl-sdk-js-v2@%s/stable/wl-sdk.js"></script>\n\n<!-- Dev (browser UMD) -->\n<script src="https://cdn.jsdelivr.net/gh/wellnessliving/wl-sdk-js-v2@%s/dev/wl-sdk.js"></script>\n```\n\n## npm (GitHub Packages)\n\n```\nnpm install @wellnessliving/sdk@%s\n```\n\n---\nAuto-generated from [wellnessliving/openapi](https://github.com/wellnessliving/openapi).\n' \
            "$TAG" "$STABLE_VER" "$DEV_VER" "$METHOD_COUNT" "$TAG" "$TAG" "$STABLE_VER" > /tmp/release-notes.md

          cp stable/wl-sdk.js /tmp/wl-sdk-stable.js
          cp dev/wl-sdk.js /tmp/wl-sdk-dev.js
          cp stable/wl-sdk.esm.js /tmp/wl-sdk-stable.esm.js
          cp dev/wl-sdk.esm.js /tmp/wl-sdk-dev.esm.js
          cp stable/wl-sdk.cjs.js /tmp/wl-sdk-stable.cjs.js
          cp dev/wl-sdk.cjs.js /tmp/wl-sdk-dev.cjs.js
          cp stable/wl-sdk.d.ts /tmp/wl-sdk-stable.d.ts
          cp dev/wl-sdk.d.ts /tmp/wl-sdk-dev.d.ts

          gh release create "$TAG" \
            /tmp/wl-sdk-stable.js \
            /tmp/wl-sdk-dev.js \
            /tmp/wl-sdk-stable.esm.js \
            /tmp/wl-sdk-dev.esm.js \
            /tmp/wl-sdk-stable.cjs.js \
            /tmp/wl-sdk-dev.cjs.js \
            /tmp/wl-sdk-stable.d.ts \
            /tmp/wl-sdk-dev.d.ts \
            --title "SDK ${TAG}" \
            --notes-file /tmp/release-notes.md

      - name: Publish to GitHub Packages
        if: steps.changes.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
