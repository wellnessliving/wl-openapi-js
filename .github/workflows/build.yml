name: Build JS SDK

on:
  repository_dispatch:
    types: [openapi-updated]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout OpenAPI spec
        uses: actions/checkout@v4
        with:
          repository: wellnessliving/openapi
          path: openapi-spec

      - name: Link spec to expected path
        run: ln -sfn "$GITHUB_WORKSPACE/openapi-spec" /tmp/openapi-spec

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate browser SDK (stable + dev + production if available)
        run: node scripts/generate.js

      - name: Generate TypeScript SDK (stable + dev + production if available)
        run: node scripts/generate-ts.js

      - name: Compile TypeScript to ESM + CJS + d.ts
        run: node scripts/compile.js

      - name: Detect changes
        id: changes
        run: |
          STABLE_VER=$(grep -m1 'Spec version:' stable/wl-sdk.js | awk '{print $NF}')
          DEV_VER=$(grep -m1 'Spec version:' dev/wl-sdk.js | awk '{print $NF}')
          echo "stable_ver=${STABLE_VER}" >> $GITHUB_OUTPUT
          echo "dev_ver=${DEV_VER}" >> $GITHUB_OUTPUT

          if [ -f production/wl-sdk.js ]; then
            PROD_VER=$(grep -m1 'Spec version:' production/wl-sdk.js | awk '{print $NF}')
            echo "prod_ver=${PROD_VER}" >> $GITHUB_OUTPUT
            echo "has_production=true" >> $GITHUB_OUTPUT
            SRC_DIR="production"
            PKG_VER="$PROD_VER"
          else
            echo "prod_ver=" >> $GITHUB_OUTPUT
            echo "has_production=false" >> $GITHUB_OUTPUT
            SRC_DIR="stable"
            PKG_VER="$STABLE_VER"
          fi

          cp "${SRC_DIR}/wl-sdk.js"     ./wl-sdk.js
          cp "${SRC_DIR}/wl-sdk.esm.js" ./wl-sdk.esm.js
          cp "${SRC_DIR}/wl-sdk.cjs.js" ./wl-sdk.cjs.js
          cp "${SRC_DIR}/wl-sdk.d.ts"   ./wl-sdk.d.ts

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$PKG_VER"

          git add wl-sdk.js wl-sdk.esm.js wl-sdk.cjs.js wl-sdk.d.ts package.json
          git diff --staged --quiet || echo "main_changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push main
        if: steps.changes.outputs.main_changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          STABLE_VER="${{ steps.changes.outputs.stable_ver }}"
          DEV_VER="${{ steps.changes.outputs.dev_ver }}"
          PROD_VER="${{ steps.changes.outputs.prod_ver }}"
          if [ -n "$PROD_VER" ]; then
            MSG=$(printf 'chore: regenerate SDK from OpenAPI spec\n\nstable: %s\ndev: %s\nproduction: %s' "$STABLE_VER" "$DEV_VER" "$PROD_VER")
          else
            MSG=$(printf 'chore: regenerate SDK from OpenAPI spec\n\nstable: %s\ndev: %s' "$STABLE_VER" "$DEV_VER")
          fi
          git commit -m "$MSG"
          git pull --rebase origin main
          git push

      - name: Update channel branches
        id: channel_push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          push_channel() {
            local CHANNEL=$1 VERSION=$2
            local WT="${RUNNER_TEMP}/wt-${CHANNEL}"

            if [ ! -f "${GITHUB_WORKSPACE}/${CHANNEL}/wl-sdk.js" ]; then
              echo "  ${CHANNEL}: no SDK file yet, skipping."
              return 0
            fi

            node -e "
              const pkg = {
                name: '@wellnessliving/sdk',
                version: process.argv[1],
                description: 'WellnessLiving JavaScript/TypeScript SDK - auto-generated from OpenAPI spec',
                main: 'wl-sdk.cjs.js',
                module: 'wl-sdk.esm.js',
                browser: 'wl-sdk.js',
                types: 'wl-sdk.d.ts',
                engines: { node: '>=18.0.0' }
              };
              require('fs').writeFileSync('/tmp/pkg-' + process.argv[2] + '.json', JSON.stringify(pkg, null, 2) + '\n');
            " "$VERSION" "$CHANNEL"

            echo "  Checking ${CHANNEL}..."
            git fetch origin "refs/heads/${CHANNEL}:refs/heads/${CHANNEL}" 2>/dev/null || true

            if git show-ref --verify --quiet "refs/heads/${CHANNEL}"; then
              git worktree add "${WT}" "${CHANNEL}"
            else
              git worktree add --orphan -b "${CHANNEL}" "${WT}"
            fi

            git -C "${WT}" rm -rf . --ignore-unmatch -q

            cp "$GITHUB_WORKSPACE/${CHANNEL}/wl-sdk.js"     "${WT}/"
            cp "$GITHUB_WORKSPACE/${CHANNEL}/wl-sdk.esm.js" "${WT}/"
            cp "$GITHUB_WORKSPACE/${CHANNEL}/wl-sdk.cjs.js" "${WT}/"
            cp "$GITHUB_WORKSPACE/${CHANNEL}/wl-sdk.d.ts"   "${WT}/"
            cp "/tmp/pkg-${CHANNEL}.json"                    "${WT}/package.json"

            git -C "${WT}" add -A

            if git -C "${WT}" diff --staged --quiet; then
              echo "  ${CHANNEL}: no changes."
            else
              git -C "${WT}" commit -m "${CHANNEL}: ${VERSION}"
              git -C "${WT}" push origin "${CHANNEL}" --force
              echo "${CHANNEL}_pushed=true" >> "$GITHUB_OUTPUT"
              echo "  ${CHANNEL}: pushed."
            fi

            git worktree remove "${WT}" --force
          }

          push_channel "stable" "${{ steps.changes.outputs.stable_ver }}"
          push_channel "dev"    "${{ steps.changes.outputs.dev_ver }}"

      - name: Package stable archive
        if: steps.channel_push.outputs.stable_pushed == 'true'
        run: cd stable && zip ../wl-openapi-js.zip wl-sdk.js wl-sdk.esm.js wl-sdk.cjs.js wl-sdk.d.ts

      - name: Release stable
        if: steps.channel_push.outputs.stable_pushed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable-${{ steps.changes.outputs.stable_ver }}
          name: stable ${{ steps.changes.outputs.stable_ver }}
          body: |
            ## WellnessLiving JS SDK - stable channel

            Spec version: `${{ steps.changes.outputs.stable_ver }}`
            Branch: [`stable`](https://github.com/wellnessliving/wl-openapi-js/tree/stable)

            ### Install

            ```bash
            npm install github:wellnessliving/wl-openapi-js#stable
            ```

            ### CDN

            ```html
            <script src="https://cdn.jsdelivr.net/gh/wellnessliving/wl-openapi-js@stable/wl-sdk.js"></script>
            ```
          prerelease: true
          files: wl-openapi-js.zip
          fail_on_unmatched_files: false
          make_latest: false

      - name: Package dev archive
        if: steps.channel_push.outputs.dev_pushed == 'true'
        run: cd dev && zip ../wl-openapi-js.zip wl-sdk.js wl-sdk.esm.js wl-sdk.cjs.js wl-sdk.d.ts

      - name: Release dev
        if: steps.channel_push.outputs.dev_pushed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.changes.outputs.dev_ver }}
          name: dev ${{ steps.changes.outputs.dev_ver }}
          body: |
            ## WellnessLiving JS SDK - dev channel

            Spec version: `${{ steps.changes.outputs.dev_ver }}`
            Branch: [`dev`](https://github.com/wellnessliving/wl-openapi-js/tree/dev)

            > **Pre-release.** Built from the dev OpenAPI spec - may contain breaking changes.

            ### Install

            ```bash
            npm install github:wellnessliving/wl-openapi-js#dev
            ```

            ### CDN

            ```html
            <script src="https://cdn.jsdelivr.net/gh/wellnessliving/wl-openapi-js@dev/wl-sdk.js"></script>
            ```
          files: wl-openapi-js.zip
          fail_on_unmatched_files: false
          make_latest: false

      - name: Package production archive
        if: steps.changes.outputs.main_changed == 'true' && steps.changes.outputs.has_production == 'true'
        run: cd production && zip ../wl-openapi-js.zip wl-sdk.js wl-sdk.esm.js wl-sdk.cjs.js wl-sdk.d.ts

      - name: Release production
        if: steps.changes.outputs.main_changed == 'true' && steps.changes.outputs.has_production == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: production-${{ steps.changes.outputs.prod_ver }}
          name: production ${{ steps.changes.outputs.prod_ver }}
          body: |
            ## WellnessLiving JS SDK - production channel

            Spec version: `${{ steps.changes.outputs.prod_ver }}`
            Branch: [`main`](https://github.com/wellnessliving/wl-openapi-js/tree/main)

            ### Install

            ```bash
            npm install github:wellnessliving/wl-openapi-js
            ```
          files: wl-openapi-js.zip
          fail_on_unmatched_files: false
          make_latest: true